version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: blocknote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: blocknote_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blocknote -d blocknote_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: 
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - DB_USER=blocknote
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=blocknote_dev
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
